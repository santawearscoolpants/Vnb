# Deploy cloudflare/worker (vnbway-api) via Wrangler. Requires repo secret CLOUDFLARE_API_TOKEN
# (Account → API Tokens → Create with Workers Scripts:Edit + needed account/R2 scopes).
name: Deploy Cloudflare Worker (vnbway-api)

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/worker/**'
      - '.github/workflows/deploy-worker-cloudflare.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-worker-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install and deploy
        working-directory: cloudflare/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm ci && npx wrangler deploy
