# Deploy cloudflare/worker (vnbway-api) via Wrangler.
#
# Secrets:
#   CLOUDFLARE_API_TOKEN — create at https://dash.cloudflare.com/profile/api-tokens (User profile),
#   NOT "Account API tokens" under Manage account. Wrangler calls /memberships and fails (e.g. 9106)
#   with the wrong token type. Use "Edit Cloudflare Workers" template + add Workers R2 Storage:Edit.
#   Optional: CLOUDFLARE_ACCOUNT_ID — 32-char hex from Workers overview URL (helps some token setups).
name: Deploy Cloudflare Worker (vnbway-api)

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/worker/**'
      - '.github/workflows/deploy-worker-cloudflare.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-worker-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install and deploy
        working-directory: cloudflare/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Add repository secret CLOUDFLARE_API_TOKEN from https://dash.cloudflare.com/profile/api-tokens (not Account API tokens)."
            exit 1
          fi
          npm ci && npx wrangler deploy
