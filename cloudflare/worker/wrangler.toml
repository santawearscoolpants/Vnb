name = "vnbway-api"
main = "src/index.ts"
compatibility_date = "2026-04-03"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "vnbway-media"

[vars]
FRONTEND_ORIGIN = "https://www.vnbway.com"
PAYSTACK_CURRENCY = "GHS"
PAYSTACK_CHANNELS = "card,mobile_money,bank_transfer"
SHIPPING_LOCAL_COUNTRIES = "Ghana"
SHIPPING_LOCAL = "20"
SHIPPING_INTERNATIONAL = "80"
FREE_SHIPPING_THRESHOLD = "1000"
TAX_MODE = "country"
TAX_RATE = "0.08"
TAXABLE_COUNTRIES = "Ghana"
